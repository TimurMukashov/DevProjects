<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - DevProjects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body>
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="auth-card card">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <a href="/" class="text-muted text-decoration-none">
                            <i class="bi bi-arrow-left"></i> На главную
                        </a>
                    </div>
                    <h2 class="text-center mb-4">Регистрация</h2>
                    <form th:action="@{/register}" th:object="${userRegistrationDto}" method="post" id="registrationForm">
                        <div class="form-section">
                            <h5 class="form-section-title"><i class="bi bi-person-circle me-2"></i>Основная информация</h5>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Имя *</label>
                                    <input type="text" class="form-control" th:field="*{firstName}">
                                    <div class="text-danger small" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Фамилия *</label>
                                    <input type="text" class="form-control" th:field="*{lastName}">
                                    <div class="text-danger small" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email *</label>
                                <input type="email" class="form-control" th:field="*{email}">
                                <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Пароль *</label>
                                    <input type="password" class="form-control" th:field="*{password}">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Подтверждение *</label>
                                    <input type="password" class="form-control" th:field="*{confirmPassword}">
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <h5 class="form-section-title"><i class="bi bi-briefcase me-2"></i>Специализации</h5>
                            <div id="specializations-container"></div>
                            <button type="button" class="btn btn-outline-primary" id="addSpecialization">
                                <i class="bi bi-plus-circle"></i> Добавить
                            </button>
                        </div>

                        <div class="form-section">
                            <h5 class="form-section-title"><i class="bi bi-code-square me-2"></i>Навыки</h5>
                            <div id="skills-container"></div>
                            <button type="button" class="btn btn-outline-primary" id="addSkill">
                                <i class="bi bi-plus-circle"></i> Добавить
                            </button>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-3 mt-3">Зарегистрироваться</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="specializationTemplate">
    <div class="item-row specialization-item mb-3">
        <div class="row">
            <div class="col-md-6"><select class="form-select specialization-select"></select></div>
            <div class="col-md-3"><input type="number" class="form-control specialization-experience" placeholder="Опыт"></div>
            <div class="col-md-2"><div class="form-check mt-2"><input type="checkbox" class="form-check-input specialization-primary"><label>Осн.</label></div></div>
            <div class="col-md-1"><button type="button" class="btn btn-outline-danger btn-sm remove-item">×</button></div>
        </div>
    </div>
</template>

<template id="skillTemplate">
    <div class="item-row skill-item mb-3">
        <div class="row">
            <div class="col-md-5"><select class="form-select skill-select"></select></div>
            <div class="col-md-3"><select class="form-select skill-level"></select></div>
            <div class="col-md-3"><input type="number" class="form-control skill-experience" placeholder="Опыт"></div>
            <div class="col-md-1"><button type="button" class="btn btn-outline-danger btn-sm remove-item">×</button></div>
        </div>
    </div>
</template>

<script th:src="@{/js/register.js}"></script>
</body>
</html>
