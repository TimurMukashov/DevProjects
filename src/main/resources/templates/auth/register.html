<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - DevProjects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="auth-card card">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <a href="/" class="text-muted text-decoration-none">
                            <i class="bi bi-arrow-left"></i> На главную
                        </a>
                    </div>

                    <h2 class="text-center mb-4">Регистрация</h2>

                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

                    <form th:action="@{/register}"
                          th:object="${userRegistrationDto}"
                          method="post"
                          id="registrationForm"> <!-- enctype="multipart/form-data" -->

                        <div class="form-section">
                            <h5 class="form-section-title">
                                <i class="bi bi-person-circle me-2"></i>Основная информация
                            </h5>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Имя *</label>
                                    <input type="text"
                                           class="form-control"
                                           th:field="*{firstName}"
                                           placeholder="Иван">
                                    <div class="error"
                                         th:if="${#fields.hasErrors('firstName')}"
                                         th:errors="*{firstName}"></div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Фамилия *</label>
                                    <input type="text"
                                           class="form-control"
                                           th:field="*{lastName}"
                                           placeholder="Петров">
                                    <div class="error"
                                         th:if="${#fields.hasErrors('lastName')}"
                                         th:errors="*{lastName}"></div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email *</label>
                                <input type="email"
                                       class="form-control"
                                       th:field="*{email}"
                                       placeholder="example@mail.com">
                                <div class="error"
                                     th:if="${#fields.hasErrors('email')}"
                                     th:errors="*{email}"></div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Пароль *</label>
                                    <input type="password"
                                           class="form-control"
                                           th:field="*{password}">
                                    <div class="error"
                                         th:if="${#fields.hasErrors('password')}"
                                         th:errors="*{password}"></div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Подтверждение пароля *</label>
                                    <input type="password"
                                           class="form-control"
                                           th:field="*{confirmPassword}">
                                    <div class="error"
                                         th:if="${#fields.hasErrors('confirmPassword')}"
                                         th:errors="*{confirmPassword}"></div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">О себе</label>
                                <textarea class="form-control"
                                          rows="3"
                                          th:field="*{bio}"
                                          placeholder="Расскажите о своем опыте..."></textarea>
                            </div>
                        </div>

                        <!-- АВАТАР (временно отключен)
                        <div class="form-section">
                            <h5 class="form-section-title">
                                <i class="bi bi-image me-2"></i>Фото профиля
                            </h5>
                            <div id="avatar-container"></div>
                            <button type="button"
                                    class="btn btn-outline-primary"
                                    id="addAvatar">
                                <i class="bi bi-plus-circle"></i> Добавить фото
                            </button>
                        </div> -->

                        <div class="form-section">
                            <h5 class="form-section-title">
                                <i class="bi bi-briefcase me-2"></i>Специализации
                            </h5>
                            <div id="specializations-container"></div>
                            <button type="button"
                                    class="btn btn-outline-primary"
                                    id="addSpecialization">
                                <i class="bi bi-plus-circle"></i> Добавить специализацию
                            </button>
                        </div>

                        <!-- ================= НАВЫКИ ================= -->
                        <div class="form-section">
                            <h5 class="form-section-title">
                                <i class="bi bi-code-square me-2"></i>Навыки
                            </h5>
                            <div id="skills-container"></div>
                            <button type="button"
                                    class="btn btn-outline-primary"
                                    id="addSkill">
                                <i class="bi bi-plus-circle"></i> Добавить навык
                            </button>
                        </div>

                        <button type="submit"
                                class="btn btn-primary w-100 py-3 mt-3">
                            <i class="bi bi-person-plus"></i> Зарегистрироваться
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-0 text-muted">
                            Уже есть аккаунт?
                            <a th:href="@{/login}"
                               class="text-primary fw-bold text-decoration-none">
                                Войти
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="specializationTemplate">
    <div class="item-row specialization-item">
        <div class="row">
            <div class="col-md-6 mb-2">
                <select class="form-select specialization-select">
                    <option value="">Выберите специализацию</option>
                </select>
            </div>
            <div class="col-md-3 mb-2">
                <input type="number"
                       class="form-control specialization-experience"
                       placeholder="Лет опыта"
                       step="0.5"
                       min="0"
                       max="50">
            </div>
            <div class="col-md-2 mb-2">
                <div class="form-check mt-2">
                    <input type="checkbox"
                           class="form-check-input specialization-primary">
                    <label class="form-check-label">Основная</label>
                </div>
            </div>
            <div class="col-md-1 mb-2">
                <button type="button"
                        class="btn btn-outline-danger btn-sm remove-item">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
        </div>
    </div>
</template>

<template id="skillTemplate">
    <div class="item-row skill-item">
        <div class="row">
            <div class="col-md-5 mb-2">
                <select class="form-select skill-select">
                    <option value="">Выберите навык</option>
                </select>
            </div>
            <div class="col-md-3 mb-2">
                <select class="form-select skill-level">
                    <option value="">Уровень</option>
                </select>
            </div>
            <div class="col-md-3 mb-2">
                <input type="number"
                       class="form-control skill-experience"
                       placeholder="Лет опыта"
                       step="0.5"
                       min="0"
                       max="50">
            </div>
            <div class="col-md-1 mb-2">
                <button type="button"
                        class="btn btn-outline-danger btn-sm remove-item">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
        </div>
    </div>
</template>

<template id="avatarTemplate">
    <div class="item-row avatar-item">
        <div class="row">
            <div class="col-md-8 mb-2">
                <input type="file"
                       class="form-control avatar-file"
                       accept="image/*">
                <small class="text-muted">JPG или PNG, до 10MB</small>
            </div>
            <div class="col-md-3 mb-2">
                <button type="button"
                        class="btn btn-outline-danger btn-sm remove-item">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
        </div>
    </div>
</template>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/register.js}"></script>
</body>
</html>
