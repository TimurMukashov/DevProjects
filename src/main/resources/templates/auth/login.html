<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход - DevProjects</title>
  <link rel="icon" type="image/png" th:href="@{/img/favicon.png}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
  <link th:href="@{/css/style.css}" rel="stylesheet">
  <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body class="auth-page">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="auth-card card">
        <div class="card-body">
          <div class="text-center mb-4">
            <a href="/" class="text-muted text-decoration-none">
              <i class="bi bi-arrow-left"></i> На главную
            </a>
          </div>

          <h2 class="text-center">Добро пожаловать!</h2>

          <div th:if="${param.error != null}" class="alert alert-danger auto-dismiss">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Неверный email или пароль
          </div>

          <div th:if="${param.logout != null and successMessage == null}" class="alert alert-success auto-dismiss">
            <i class="bi bi-check-circle-fill me-2"></i>
            Вы успешно вышли из системы
          </div>

          <div th:if="${successMessage != null}" class="alert alert-success auto-dismiss" th:text="${successMessage}"></div>

          <form th:action="@{/login}" method="post" class="mt-4">
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" name="email"
                     placeholder="example@mail.com" required="required" autofocus="autofocus" />
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Пароль</label>
              <input type="password" class="form-control" id="password" name="password"
                     placeholder="••••••••" required="required" />
            </div>

            <div class="mb-4 form-check">
              <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me" />
              <label class="form-check-label" for="remember-me">Запомнить меня</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">
              <i class="bi bi-box-arrow-in-right me-2"></i>Войти
            </button>
          </form>

          <div class="text-center mt-4">
            <p class="mb-0 text-muted">
              Нет аккаунта?
              <a th:href="@{/register}" class="text-primary fw-bold text-decoration-none">
                Зарегистрироваться
              </a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/js/auth.js}"></script>
</body>
</html>
