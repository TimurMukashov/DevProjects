<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${project.title} + ' - DevProjects'">Проект</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        .project-header {
            background: linear-gradient(135deg, #6b46c1 0%, #553c9a 100%);
            color: white;
            padding: 3rem 0;
            margin-bottom: 2rem;
        }
        .role-card {
            border-left: 4px solid #6b46c1;
            transition: transform 0.2s;
            border-radius: 8px;
        }
        .role-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(107, 70, 193, 0.15);
        }
        .stat-icon {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body>
<!-- Навигация -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">DevProjects</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Главная</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" href="/dashboard">Личный кабинет</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" href="/login">Вход</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Заголовок проекта -->
<div class="project-header">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h1 th:text="${project.title}" class="display-4 fw-bold mb-3"></h1>
                <div class="d-flex align-items-center mb-3">
                    <span class="badge bg-light text-dark p-2 me-3"
                          th:classappend="'bg-' + ${project.statusColor}"
                          th:text="${project.statusText}"></span>
                    <span class="me-3">
                        <i class="bi bi-person-circle me-1"></i>
                        <span th:text="${project.authorName}"></span>
                    </span>
                    <span>
                        <i class="bi bi-calendar me-1"></i>
                        <span th:if="${project.deadline}" th:text="${#temporals.format(project.deadline, 'dd.MM.yyyy')}"></span>
                        <span th:unless="${project.deadline}">Без дедлайна</span>
                    </span>
                </div>
            </div>
            <div class="col-md-4">
                <div class="bg-white bg-opacity-25 rounded-3 p-3">
                    <div class="row text-center">
                        <div class="col-4">
                            <div class="stat-icon">
                                <i class="bi bi-eye-fill"></i>
                            </div>
                            <div class="h4 mb-0 fw-bold" th:text="${project.viewsCount}"></div>
                            <small>просмотров</small>
                        </div>
                        <div class="col-4">
                            <div class="stat-icon">
                                <i class="bi bi-people-fill"></i>
                            </div>
                            <div class="h4 mb-0 fw-bold" th:text="${project.applicationsCount}"></div>
                            <small>заявок</small>
                        </div>
                        <div class="col-4">
                            <div class="stat-icon">
                                <i class="bi bi-briefcase-fill"></i>
                            </div>
                            <div class="h4 mb-0 fw-bold" th:text="${project.totalVacancies}"></div>
                            <small>вакансий</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Основной контент -->
<div class="container my-5">
    <div class="row">
        <!-- Левая колонка - описание -->
        <div class="col-lg-8">
            <div class="card mb-4 border-0 shadow-sm">
                <div class="card-header bg-white border-0 pt-4">
                    <h5 class="mb-0 fw-bold text-primary">О проекте</h5>
                </div>
                <div class="card-body pt-0">
                    <p class="lead" th:text="${project.description}" style="white-space: pre-line; font-size: 1.1rem;"></p>
                </div>
            </div>

            <!-- Роли в проекте -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 pt-4">
                    <h5 class="mb-0 fw-bold text-primary">Требуемые специалисты</h5>
                </div>
                <div class="card-body">
                    <div th:each="role : ${project.roles}" class="card role-card mb-3 border">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h6 class="mb-1 fw-bold" th:text="${role.title}"></h6>
                                    <span class="badge bg-light text-dark" th:text="${role.specialization}"></span>
                                </div>
                                <div class="text-end">
                                    <span class="badge bg-primary"
                                          th:text="${role.vacancies - role.filled} + ' из ' + ${role.vacancies} + ' мест'">
                                    </span>
                                </div>
                            </div>

                            <!-- Кнопка отклика -->
                            <div class="mt-3" sec:authorize="isAuthenticated()" th:if="${role.open}">
                                <button class="btn btn-outline-primary btn-sm" disabled>
                                    <i class="bi bi-send me-1"></i>Откликнуться
                                    <small class="text-muted ms-2">(в разработке)</small>
                                </button>
                            </div>
                            <div class="mt-3" sec:authorize="!isAuthenticated()" th:if="${role.open}">
                                <a href="/login" class="btn btn-outline-secondary btn-sm">
                                    <i class="bi bi-box-arrow-in-right me-1"></i>Войдите для отклика
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Правая колонка - информация -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 pt-4">
                    <h5 class="mb-0 fw-bold text-primary">Информация</h5>
                </div>
                <div class="card-body">
                    <ul class="list-unstyled">
                        <li class="mb-3 d-flex align-items-center">
                            <i class="bi bi-calendar-check me-3 text-primary fs-5"></i>
                            <div>
                                <strong class="d-block">Создан</strong>
                                <span th:text="${#temporals.format(project.createdAt, 'dd.MM.yyyy')}"></span>
                            </div>
                        </li>
                        <li class="mb-3 d-flex align-items-center" th:if="${project.deadline}">
                            <i class="bi bi-clock me-3 text-primary fs-5"></i>
                            <div>
                                <strong class="d-block">Дедлайн</strong>
                                <span th:text="${#temporals.format(project.deadline, 'dd.MM.yyyy')}"></span>
                                <span class="badge bg-warning ms-2"
                                      th:if="${project.daysLeft > 0 and project.daysLeft <= 7}"
                                      th:text="'Осталось ' + ${project.daysLeft} + ' дн.'">
                                </span>
                            </div>
                        </li>
                        <li class="mb-3 d-flex align-items-center">
                            <i class="bi bi-person-badge me-3 text-primary fs-5"></i>
                            <div>
                                <strong class="d-block">Автор</strong>
                                <span th:text="${project.authorName}"></span>
                            </div>
                        </li>
                        <li class="mb-3 d-flex align-items-center">
                            <i class="bi bi-people me-3 text-primary fs-5"></i>
                            <div>
                                <strong class="d-block">Команда</strong>
                                <span th:text="${project.filledVacancies} + '/' + ${project.totalVacancies} + ' мест занято'"></span>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
