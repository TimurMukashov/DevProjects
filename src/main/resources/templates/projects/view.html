<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${project.title} + ' - DevProjects'">Проект</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <meta th:if="${_csrf}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf}" name="_csrf_header" th:content="${_csrf.headerName}"/>
    <style>
        .project-header {
            background: linear-gradient(135deg, #6b46c1 0%, #553c9a 100%);
            color: white;
            padding: 3rem 0;
            margin-bottom: 2rem;
        }
        .role-card {
            border-left: 4px solid #6b46c1;
            transition: transform 0.2s;
            border-radius: 8px;
        }
        .role-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(107, 70, 193, 0.15);
        }
        .stat-icon {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">DevProjects</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <th:block th:replace="~{fragments/notification-bell :: bell}"></th:block>
                <li class="nav-item">
                    <a class="nav-link" href="/">Главная</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" href="/dashboard">Личный кабинет</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" href="/logout">Выйти</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" href="/login">Вход</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-3">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>

<div class="project-header">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h1 th:text="${project.title}" class="display-4 fw-bold mb-3"></h1>
                <div class="d-flex align-items-center mb-3">
                    <span class="badge bg-light text-dark p-2 me-3"
                          th:classappend="'bg-' + ${project.statusColor}"
                          th:text="${project.statusText}"></span>
                    <span class="me-3">
                        <i class="bi bi-person-circle me-1"></i>
                        <span th:text="${project.authorName}"></span>
                    </span>
                    <span>
                        <i class="bi bi-calendar me-1"></i>
                        <span th:if="${project.deadline}" th:text="${#temporals.format(project.deadline, 'dd.MM.yyyy')}"></span>
                        <span th:unless="${project.deadline}">Без дедлайна</span>
                    </span>
                </div>
            </div>
            <div class="col-md-4">
                <div class="bg-white bg-opacity-25 rounded-3 p-3">
                    <div class="row text-center">
                        <div class="col-4">
                            <div class="stat-icon">
                                <i class="bi bi-eye-fill"></i>
                            </div>
                            <div class="h4 mb-0 fw-bold" th:text="${project.viewsCount}"></div>
                            <small>просмотров</small>
                        </div>
                        <div class="col-4">
                            <div class="stat-icon">
                                <i class="bi bi-people-fill"></i>
                            </div>
                            <div class="h4 mb-0 fw-bold" th:text="${project.applicationsCount}"></div>
                            <small>заявок</small>
                        </div>
                        <div class="col-4">
                            <div class="stat-icon">
                                <i class="bi bi-briefcase-fill"></i>
                            </div>
                            <div class="h4 mb-0 fw-bold" th:text="${project.totalVacancies}"></div>
                            <small>вакансий</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container my-5">
    <div class="row">
        <div class="col-lg-8">
            <div class="card mb-4 border-0 shadow-sm">
                <div class="card-header bg-white border-0 pt-4 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold text-primary">О проекте</h5>
                    <button id="favoriteBtn"
                            class="btn btn-sm"
                            th:classappend="${isFavorite} ? 'btn-danger' : 'btn-outline-danger'"
                            th:onclick="'toggleFavorite(' + ${project.id} + ')'"
                            sec:authorize="isAuthenticated()">
                        <i id="heartIcon" class="bi" th:classappend="${isFavorite} ? 'bi-heart-fill' : 'bi-heart'"></i>
                        <span id="favoriteBtnText" class="ms-1"
                              th:text="${isFavorite} ? 'В избранном' : 'Добавить в избранное'"></span>
                    </button>
                </div>
                <div class="card-body pt-0">
                    <p class="lead" th:text="${project.description}" style="white-space: pre-line; font-size: 1.1rem;"></p>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 pt-4">
                    <h5 class="mb-0 fw-bold text-primary">Требуемые специалисты</h5>
                </div>
                <div class="card-body">
                    <div th:each="role : ${project.roles}" class="card role-card mb-3 border">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h6 class="mb-1 fw-bold" th:text="${role.title}"></h6>
                                    <span class="badge bg-light text-dark" th:text="${role.specialization}"></span>
                                </div>
                                <div class="text-end">
                                    <span class="badge bg-primary"
                                          th:text="${role.vacancies - role.filled} + ' из ' + ${role.vacancies} + ' мест'">
                                    </span>
                                </div>
                            </div>
                            <div class="mt-3" sec:authorize="isAuthenticated()">
                                <button th:if="${role.isOpen and (role.vacancies > role.filled)}"
                                        type="button"
                                        class="btn btn-outline-primary btn-sm"
                                        data-bs-toggle="modal"
                                        data-bs-target="#applyModal"
                                        th:data-role-id="${role.id}"
                                        th:data-role-title="${role.title}">
                                    <i class="bi bi-send me-1"></i>Откликнуться
                                </button>
                                <button th:unless="${role.isOpen and (role.vacancies > role.filled)}"
                                        class="btn btn-outline-secondary btn-sm" disabled>
                                    <i class="bi bi-send-slash me-1"></i>Набор закрыт
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 pt-4">
                    <h5 class="mb-0 fw-bold text-primary">Информация</h5>
                </div>
                <div class="card-body">
                    <ul class="list-unstyled">
                        <li class="mb-3 d-flex align-items-center">
                            <i class="bi bi-calendar-check me-3 text-primary fs-5"></i>
                            <div>
                                <strong class="d-block">Создан</strong>
                                <span th:text="${#temporals.format(project.createdAt, 'dd.MM.yyyy')}"></span>
                            </div>
                        </li>
                        <li class="mb-3 d-flex align-items-center" th:if="${project.deadline}">
                            <i class="bi bi-clock me-3 text-primary fs-5"></i>
                            <div>
                                <strong class="d-block">Дедлайн</strong>
                                <span th:text="${#temporals.format(project.deadline, 'dd.MM.yyyy')}"></span>
                            </div>
                        </li>
                        <li class="mb-3 d-flex align-items-center">
                            <i class="bi bi-person-badge me-3 text-primary fs-5"></i>
                            <div>
                                <strong class="d-block">Автор</strong>
                                <span th:text="${project.authorName}"></span>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="applyModal" tabindex="-1" aria-labelledby="applyModalLabel" aria-hidden="true" sec:authorize="isAuthenticated()">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow">
            <form th:action="@{/projects/{id}/apply(id=${project.id})}" method="post">
                <div class="modal-header bg-light border-0">
                    <h5 class="modal-title fw-bold" id="applyModalLabel">Отклик на роль: <span id="modalRoleTitle" class="text-primary"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <input type="hidden" name="roleId" id="modalRoleId">

                    <div class="mb-3">
                        <label for="coverLetter" class="form-label fw-bold">Сопроводительное письмо</label>
                        <textarea class="form-control" id="coverLetter" name="coverLetter" rows="5"
                                  placeholder="Расскажите, почему вы хотите участвовать в проекте, и опишите свой релевантный опыт... (необязательно, но повышает шансы)"></textarea>
                    </div>
                </div>
                <div class="modal-footer bg-light border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-send me-1"></i>Отправить заявку</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/favorites.js}"></script>

<script sec:authorize="isAuthenticated()">
    document.addEventListener('DOMContentLoaded', function () {
        var applyModal = document.getElementById('applyModal');
        if (applyModal) {
            applyModal.addEventListener('show.bs.modal', function (event) {
                var button = event.relatedTarget;
                var roleId = button.getAttribute('data-role-id');
                var roleTitle = button.getAttribute('data-role-title');

                var modalRoleIdInput = applyModal.querySelector('#modalRoleId');
                var modalRoleTitleSpan = applyModal.querySelector('#modalRoleTitle');

                modalRoleIdInput.value = roleId;
                modalRoleTitleSpan.textContent = roleTitle;
            });
        }
    });
</script>
</body>
</html>
