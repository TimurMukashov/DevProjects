<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мои проекты - DevProjects</title>
  <link rel="icon" type="image/png" th:href="@{/img/favicon.png}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
  <link th:href="@{/css/style.css}" rel="stylesheet">
  <link th:href="@{/css/dashboard.css}" rel="stylesheet">
  <meta th:if="${_csrf}" name="_csrf" th:content="${_csrf.token}"/>
  <meta th:if="${_csrf}" name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/">DevProjects</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        <th:block th:replace="~{fragments/notification-bell :: bell}"></th:block>

        <li class="nav-item">
          <a class="nav-link active" href="/dashboard">
            <i class="bi bi-person-circle me-1"></i>Личный кабинет
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/logout">
            <i class="bi bi-box-arrow-right me-1"></i>Выйти
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container my-5">
  <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
    <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold"><i class="bi bi-folder2-open me-2 text-primary"></i>Мои проекты</h2>
    <a href="/projects/new" class="btn btn-pill btn-violet px-4"><i class="bi bi-plus-lg me-1"></i> Новый проект</a>
  </div>

  <div th:if="${#lists.isEmpty(projects)}" class="text-center py-5 bg-white rounded shadow-sm">
    <i class="bi bi-clipboard-x display-1 text-muted"></i>
    <p class="lead mt-3">Вы еще не создали ни одного проекта</p>
    <a href="/projects/new" class="btn btn-pill btn-violet mt-2 px-4">Создать первый проект</a>
  </div>

  <div class="row" th:unless="${#lists.isEmpty(projects)}">
    <div class="col-12 mb-3" th:each="project : ${projects}">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body d-flex justify-content-between align-items-center p-4">
          <div>
            <span th:class="'badge mb-2 bg-' + ${project.statusColor}" th:text="${project.statusText}"></span>
            <h5 class="fw-bold mb-1" th:text="${project.title}"></h5>
            <p class="text-muted small mb-0" th:text="'Создан: ' + ${#temporals.format(project.createdAt, 'dd.MM.yyyy')}"></p>
          </div>
          <div class="d-flex gap-2 align-items-center">

            <a th:href="@{/dashboard/projects/{id}/applications(id=${project.id})}" class="btn btn-pill btn-sm btn-outline-primary px-3">
              <i class="bi bi-people-fill me-1"></i> Заявки
              <span class="badge bg-primary rounded-pill ms-1" th:if="${project.applicationsCount > 0}" th:text="${project.applicationsCount}"></span>
            </a>

            <a th:href="@{/projects/{id}(id=${project.id})}" class="btn btn-pill btn-sm btn-outline-secondary px-3">
              <i class="bi bi-eye me-1"></i> Просмотр
            </a>

            <a th:if="${project.statusText == 'Открыт' or project.statusText == 'В работе'}"
               th:href="@{/projects/{id}/edit(id=${project.id})}"
               class="btn btn-pill btn-sm btn-outline-violet px-3">
              <i class="bi bi-pencil me-1"></i> Правка
            </a>

            <th:block th:if="${project.statusText == 'Открыт' or project.statusText == 'В работе'}">
              <button type="button" class="btn btn-pill btn-sm btn-outline-danger px-3"
                      data-bs-toggle="modal"
                      th:data-bs-target="'#closeProjectModal' + ${project.id}">
                <i class="bi bi-x-circle me-1"></i> Закрыть
              </button>
            </th:block>

            <span th:if="${project.statusText == 'Завершён'}"
                  class="badge bg-secondary d-flex align-items-center px-3 ms-2 py-2">
              <i class="bi bi-check-circle-fill me-1"></i> Завершён
            </span>

            <div th:id="'closeProjectModal' + ${project.id}" class="modal fade" tabindex="-1">
              <div class="modal-dialog">
                <div class="modal-content">
                  <div class="modal-header">
                    <h5 class="modal-title fw-bold">
                      <i class="bi bi-exclamation-triangle text-warning me-2"></i>
                      Подтверждение
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                  </div>
                  <div class="modal-body p-4 text-center">
                    <p class="mb-2 lead">Вы уверены, что хотите закрыть проект?</p>
                    <p class="fw-bold" th:text="${project.title}"></p>
                    <p class="text-muted small mb-0">
                      Это действие нельзя будет отменить.
                    </p>
                  </div>
                  <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Отмена</button>
                    <form th:action="@{/dashboard/projects/{id}/close(id=${project.id})}" method="post" class="d-inline">
                      <button type="submit" class="btn btn-danger px-4">Подтвердить</button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
