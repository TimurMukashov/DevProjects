<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Мои проекты - DevProjects</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
  <link th:href="@{/css/style.css}" rel="stylesheet">
  <link th:href="@{/css/dashboard.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">DevProjects</a>
    <a href="/dashboard" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left"></i> В кабинет</a>
  </div>
</nav>

<div class="container my-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold"><i class="bi bi-folder2-open me-2"></i>Мои проекты</h2>
    <a href="/projects/new" class="btn btn-success"><i class="bi bi-plus-lg"></i> Новый проект</a>
  </div>

  <div th:if="${#lists.isEmpty(projects)}" class="text-center py-5 bg-white rounded shadow-sm">
    <i class="bi bi-clipboard-x display-1 text-muted"></i>
    <p class="lead mt-3">Вы еще не создали ни одного проекта</p>
    <a href="/projects/new" class="btn btn-primary mt-2">Создать первый проект</a>
  </div>

  <div class="row" th:unless="${#lists.isEmpty(projects)}">
    <div class="col-12 mb-3" th:each="project : ${projects}">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <span th:class="'badge mb-2 bg-' + ${project.statusColor()}" th:text="${project.statusText()}"></span>
            <h5 class="fw-bold mb-1" th:text="${project.title()}"></h5>
            <p class="text-muted small mb-0" th:text="'Создан: ' + ${#temporals.format(project.createdAt(), 'dd.MM.yyyy')}"></p>
          </div>
          <div class="d-flex gap-2">
            <a th:href="@{/projects/{id}(id=${project.id()})}" class="btn btn-pill btn-sm btn-outline-secondary">
              <i class="bi bi-eye me-1"></i> Просмотр
            </a>
            <a th:href="@{/projects/{id}/edit(id=${project.id()})}" class="btn btn-pill btn-sm btn-outline-violet">
              <i class="bi bi-pencil me-1"></i> Правка
            </a>
            <form th:action="@{/dashboard/projects/{id}/close(id=${project.id()})}" method="post">
              <button type="submit" class="btn btn-pill btn-sm btn-outline-danger">
                <i class="bi bi-x-circle me-1"></i> Закрыть
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
