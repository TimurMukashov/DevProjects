<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Избранные проекты - DevProjects</title>
    <link rel="icon" type="image/png" th:href="@{/img/favicon.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <meta th:if="${_csrf}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf}" name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">DevProjects</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <th:block th:replace="~{fragments/notification-bell :: bell}"></th:block>
                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">
                        <i class="bi bi-speedometer2 me-1"></i>Дашборд
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/dashboard/favorites">
                        <i class="bi bi-heart-fill me-1"></i>Избранное
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/logout">
                        <i class="bi bi-box-arrow-right me-1"></i>Выйти
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="d-flex align-items-center mb-4">
        <a href="/dashboard" class="btn btn-outline-secondary btn-sm me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="fw-bold mb-0 text-violet">Избранные проекты</h2>
    </div>

    <div th:if="${#lists.isEmpty(projects)}" class="text-center py-5 shadow-sm bg-white rounded-3">
        <i class="bi bi-heart text-muted" style="font-size: 4rem;"></i>
        <p class="lead mt-3 text-muted">У вас пока нет избранных проектов.</p>
        <a href="/" class="btn btn-primary mt-2">
            <i class="bi bi-search me-1"></i> Найти интересные проекты
        </a>
    </div>

    <div class="row" th:unless="${#lists.isEmpty(projects)}">
        <div class="col-md-4 mb-4" th:each="project : ${projects}">
            <div class="project-card position-relative"
                 th:onclick="'window.location.href=\'/projects/' + ${project.id} + '\''">

                <div class="card-body">
                    <div class="d-flex justify-content-end">
                        <span th:class="'status-badge badge bg-' + ${project.statusColor}"
                              th:text="${project.statusText}"></span>
                    </div>

                    <h5 class="project-title">
                        <a th:href="@{/projects/{id}(id=${project.id})}"
                           onclick="event.stopPropagation();"
                           th:text="${project.title}"></a>
                    </h5>

                    <p class="project-description" th:text="${project.shortDescription}"></p>

                    <div class="roles-container" th:if="${project.roles != null and !project.roles.isEmpty()}">
                        <div th:each="role : ${project.roles}" class="role-item">
                            <span class="role-name" th:text="${role.specialization}"></span>
                            <span class="role-count"
                                  th:text="${role.filled} + '/' + ${role.vacancies}"></span>
                        </div>
                    </div>

                    <div class="skills-container" th:if="${project.skills != null and !project.skills.isEmpty()}">
                        <span th:each="skill : ${project.skills}"
                              class="skill-badge"
                              th:classappend="${skill.required} ? 'required' : 'optional'"
                              th:text="${skill.name}">
                        </span>
                    </div>

                    <div class="project-meta">
                        <span class="author-info">
                            <i class="bi bi-person"></i>
                            <span th:text="${project.authorName}"></span>
                        </span>
                        <div class="stats-info">
                            <span>
                                <i class="bi bi-eye"></i>
                                <span th:text="${project.viewsCount}"></span>
                            </span>
                            <span th:if="${project.daysLeft > 0}">
                                <i class="bi bi-calendar3"></i>
                                <span th:text="${project.daysLeft} + 'д'"></span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-light py-4 mt-5">
    <div class="container text-center">
        <p class="text-muted mb-0">&copy; 2026 DevProjects.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
