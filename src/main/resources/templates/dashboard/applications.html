<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявки на проект - DevProjects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <meta th:if="${_csrf}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf}" name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">DevProjects</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/dashboard">
                        <i class="bi bi-person-circle me-1"></i>Личный кабинет
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/logout">
                        <i class="bi bi-box-arrow-right me-1"></i>Выйти
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1">Заявки от кандидатов</h2>
            <p class="text-muted mb-0">Проект: <span th:text="${project.title}" class="fw-bold"></span></p>
        </div>
        <a href="/dashboard/projects" class="btn btn-outline-primary btn-sm px-3">
            <i class="bi bi-arrow-left me-1"></i> К моим проектам
        </a>
    </div>

    <div th:if="${#lists.isEmpty(applications)}" class="text-center py-5 bg-white rounded shadow-sm">
        <i class="bi bi-people text-muted display-1"></i>
        <p class="lead mt-3 text-muted">На этот проект пока никто не откликнулся.</p>
    </div>

    <div class="row" th:unless="${#lists.isEmpty(applications)}">
        <div class="col-md-6 mb-4" th:each="app : ${applications}">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-3">
                        <img th:src="${app.specialist.avatarUrl != null ? app.specialist.avatarUrl : '/img/default-avatar.png'}"
                             class="rounded-circle me-3" style="width: 45px; height: 45px; object-fit: cover;">
                        <div>
                            <h6 class="mb-0 fw-bold" th:text="${app.specialist.firstName + ' ' + app.specialist.lastName}"></h6>
                            <small class="text-muted" th:text="${app.specialist.email}"></small>
                        </div>
                    </div>

                    <div class="mb-3">
                        <span class="badge bg-light text-dark border">Роль: <span th:text="${app.projectRole.getSpecializationName()}"></span></span>
                        <span class="badge" th:classappend="${app.status.name() == 'pending' ? 'bg-warning text-dark' : (app.status.name() == 'accepted' ? 'bg-success' : 'bg-danger')}"
                              th:text="${app.status.name() == 'pending' ? 'Ожидает' : (app.status.name() == 'accepted' ? 'Принят' : 'Отклонен')}"></span>
                    </div>

                    <div class="bg-light p-3 rounded mb-3">
                        <small class="fw-bold d-block mb-1 text-uppercase text-muted" style="font-size: 0.75rem;">Сопроводительное письмо:</small>
                        <p class="mb-0 small" th:text="${app.coverLetter != null && !app.coverLetter.isEmpty() ? app.coverLetter : 'Без письма'}"></p>
                    </div>

                    <div class="d-flex gap-2" th:if="${app.status.name() == 'pending'}">
                        <form th:action="@{/dashboard/applications/{id}/accept(id=${app.id})}" method="post" class="flex-grow-1">
                            <input type="hidden" name="projectId" th:value="${project.id}">
                            <button type="submit" class="btn btn-success btn-sm w-100">Принять</button>
                        </form>
                        <form th:action="@{/dashboard/applications/{id}/reject(id=${app.id})}" method="post" class="flex-grow-1">
                            <input type="hidden" name="projectId" th:value="${project.id}">
                            <button type="submit" class="btn btn-outline-danger btn-sm w-100">Отклонить</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
