<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - DevProjects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <meta th:if="${_csrf}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf}" name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">DevProjects</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <th:block th:replace="~{fragments/notification-bell :: bell}"></th:block>
                <li class="nav-item"><a class="nav-link" href="/dashboard">Дашборд</a></li>
                <li class="nav-item"><a class="nav-link active" href="/dashboard/profile">Профиль</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-4">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="dashboard-card shadow-sm">
                <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                    <h4 class="fw-bold mb-0">Личные данные</h4>
                    <a href="/dashboard/edit" class="btn btn-primary btn-sm">
                        <i class="bi bi-pencil-square me-2"></i>Редактировать
                    </a>
                </div>

                <div class="row mb-4">
                    <div class="col-md-4 profile-sidebar border-end">
                        <div class="profile-avatar mb-3">
                            <img th:if="${user.avatarUrl != null}" th:src="@{${user.avatarUrl}}" class="rounded-circle shadow-sm" style="width: 150px; height: 150px; object-fit: cover;">
                            <div th:unless="${user.avatarUrl != null}" class="avatar-placeholder rounded-circle d-inline-flex align-items-center justify-content-center bg-light" style="width: 150px; height: 150px; font-size: 3rem;">
                                <span th:text="${user.firstName.charAt(0)} + ${user.lastName.charAt(0)}"></span>
                            </div>
                        </div>
                        <h5 th:text="${user.firstName + ' ' + user.lastName}" class="fw-bold mb-3"></h5>
                    </div>

                    <div class="col-md-8 ps-md-4">
                        <div class="mb-3">
                            <label class="text-muted small d-block">Email</label>
                            <span th:text="${user.email}" class="fw-bold"></span>
                        </div>
                        <div class="mb-3">
                            <label class="text-muted small d-block">Дата регистрации</label>
                            <span th:text="${#temporals.format(user.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
                        </div>
                        <div class="mb-3">
                            <label class="text-muted small d-block">О себе</label>
                            <p th:text="${user.bio != null and !user.bio.isEmpty() ? user.bio : 'Описание отсутствует'}" style="white-space: pre-line;"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
