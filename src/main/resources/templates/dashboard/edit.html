<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование - DevProjects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <meta th:if="${_csrf}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf}" name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">DevProjects</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <th:block th:replace="~{fragments/notification-bell :: bell}"></th:block>

                <li class="nav-item"><a class="nav-link" href="/dashboard">Дашборд</a></li>
                <li class="nav-item"><a class="nav-link" href="/dashboard/profile">Профиль</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout">Выйти</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="dashboard-card shadow-sm">
                <div class="d-flex align-items-center mb-4">
                    <a href="/dashboard/profile" class="btn btn-outline-secondary btn-sm me-3">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                    <h4 class="mb-0 fw-bold">Настройка профиля</h4>
                </div>

                <form th:action="@{/dashboard/edit}" method="post" enctype="multipart/form-data">
                    <div class="row mb-4 align-items-center">
                        <div class="col-auto">
                            <img id="avatarPreview" th:if="${user.avatarUrl != null}" th:src="@{${user.avatarUrl}}" class="rounded-circle shadow-sm" style="width: 100px; height: 100px; object-fit: cover;">
                            <div id="avatarPlaceholder" th:unless="${user.avatarUrl != null}" class="avatar-placeholder rounded-circle d-inline-flex align-items-center justify-content-center bg-light" style="width: 100px; height: 100px; font-size: 2rem;">
                                <span th:text="${user.firstName.charAt(0)} + ${user.lastName.charAt(0)}"></span>
                            </div>
                        </div>
                        <div class="col">
                            <label class="form-label fw-bold">Фото профиля</label>
                            <input type="file" id="avatarInput" class="form-control form-control-sm" name="avatar" accept="image/*">
                            <div class="form-text">Рекомендуется квадратное изображение, до 5МБ.</div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Имя</label>
                            <input type="text" class="form-control" name="firstName" th:value="${user.firstName}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Фамилия</label>
                            <input type="text" class="form-control" name="lastName" th:value="${user.lastName}" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">О себе (Bio)</label>
                        <textarea class="form-control" name="bio" rows="5" th:text="${user.bio}" placeholder="Кратко опишите вашу специализацию и опыт..."></textarea>
                    </div>

                    <div class="pt-3 border-top d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check2-circle me-2"></i>Сохранить изменения
                        </button>
                        <a href="/dashboard/profile" class="btn btn-light px-4">Отмена</a>
                    </div>
                </form>

                <div class="mt-5 pt-4 border-top">
                    <h6 class="text-muted text-uppercase fw-bold mb-3" style="font-size: 0.8rem; letter-spacing: 1px;">Ваши компетенции</h6>

                    <div class="mb-4">
                        <p class="small fw-bold mb-2">Специализации:</p>
                        <div class="d-flex flex-wrap gap-2">
                            <span th:each="spec : ${user.specializations}" class="badge bg-light text-dark border p-2">
                                <i class="bi bi-briefcase me-1"></i>
                                <span th:text="${spec.specialization.name}"></span>
                                <span th:if="${spec.isPrimary}" class="ms-1 text-primary">★</span>
                            </span>
                        </div>
                    </div>

                    <div>
                        <p class="small fw-bold mb-2">Навыки:</p>
                        <div class="d-flex flex-wrap gap-2">
                            <span th:each="skill : ${user.skills}" class="badge bg-info bg-opacity-10 text-info border border-info border-opacity-25 p-2">
                                <span th:text="${skill.skill.name}"></span>
                                <small class="ms-1 opacity-75" th:text="'(' + ${skill.proficiencyLevel.displayName} + ')'"></small>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/profile-edit.js}"></script>
</body>
</html>
