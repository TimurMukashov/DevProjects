<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование профиля - DevProjects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">DevProjects</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/dashboard">Дашборд</a></li>
                <li class="nav-item"><a class="nav-link active" href="/dashboard/edit">Редактировать</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout">Выйти</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="dashboard-card">
                <h4 class="mb-4">Редактирование профиля</h4>

                <form th:action="@{/dashboard/edit}" method="post" enctype="multipart/form-data">
                    <div class="text-center mb-4">
                        <div class="profile-avatar-large mb-3">
                            <img th:if="${user.avatarUrl != null}" th:src="@{${user.avatarUrl}}" class="rounded-circle img-fluid" style="width: 150px; height: 150px; object-fit: cover;">
                            <div th:unless="${user.avatarUrl != null}" class="avatar-placeholder-large rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 150px; height: 150px; background: #e9ecef; font-size: 3rem;">
                                <span th:text="${user.firstName != null ? user.firstName.charAt(0) : '?'} + (${user.lastName != null ? user.lastName.charAt(0) : '?'})"></span>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3"><label class="form-label">Имя</label><input type="text" class="form-control" name="firstName" th:value="${user.firstName}" required></div>
                    <div class="mb-3"><label class="form-label">Фамилия</label><input type="text" class="form-control" name="lastName" th:value="${user.lastName}" required></div>
                    <div class="mb-3"><label class="form-label">О себе</label><textarea class="form-control" name="bio" rows="4" th:text="${user.bio}"></textarea></div>
                    <div class="mb-4"><label class="form-label">Новое фото</label><input type="file" class="form-control" name="avatar" accept="image/*"></div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-2"></i>Сохранить</button>
                        <a href="/dashboard/profile" class="btn btn-outline-secondary">Отмена</a>
                    </div>
                </form>

                <div class="mt-5">
                    <h5>Специализации</h5>
                    <div th:if="${user.specializations != null and !user.specializations.isEmpty()}">
                        <div th:each="spec : ${user.specializations}" class="mb-2">
                            <span class="badge bg-light text-dark p-2">
                                <span th:text="${spec.specialization.name}"></span>
                                <span th:if="${spec.isPrimary}" class="badge bg-primary ms-1">основная</span>
                                <span class="text-muted ms-1" th:text="${T(com.example.devprojects.util.DateUtils).formatYears(spec.yearsOfExperience)}"></span>
                            </span>
                        </div>
                    </div>

                    <h5 class="mt-4">Навыки</h5>
                    <div th:if="${user.skills != null and !user.skills.isEmpty()}">
                        <div th:each="skill : ${user.skills}" class="mb-2">
                            <span class="badge bg-light text-dark p-2">
                                <span th:text="${skill.skill.name}"></span>
                                <span class="badge bg-info ms-1" th:text="${skill.proficiencyLevel.displayName}"></span>
                                <span class="text-muted ms-1" th:text="${T(com.example.devprojects.util.DateUtils).formatYears(skill.yearsOfExperience)}"></span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
